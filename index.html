let questions = [];
let currentIndex = 0;
let answerVisible = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  const custom5 = document.getElementById('custom5').value.trim();
  const custom10 = document.getElementById('custom10').value.trim();
  const custom15 = document.getElementById('custom15').value.trim();

  const customSlots = [custom5, custom10, custom15].filter(Boolean).length;
  const needRandom = 15 - customSlots;

  const randomQuestions = shuffle(questionBank).slice(0, needRandom);

  questions = [];
  let randomIdx = 0;

  for (let i = 1; i <= 15; i++) {
    if (i === 5 && custom5) {
      questions.push({ q: custom5, a: "—" });
    } else if (i === 10 && custom10) {
      questions.push({ q: custom10, a: "—" });
    } else if (i === 15 && custom15) {
      questions.push({ q: custom15, a: "—" });
    } else {
      questions.push(randomQuestions[randomIdx++]);
    }
  }

  currentIndex = 0;
  answerVisible = false;

  document.getElementById('startPage').style.display = 'none';
  document.getElementById('gamePage').style.display = 'block';
  document.getElementById('endPage').style.display = 'none';

  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIndex];
  document.getElementById('progress').textContent = `第 ${currentIndex + 1} / 15 题`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('answerText').textContent = `参考答案：${q.a}`;
  document.getElementById('answerText').style.display = answerVisible ? 'block' : 'none';
  document.getElementById('btnShowAnswer').textContent = answerVisible ? '隐藏参考答案' : '显示参考答案';

  document.getElementById('btnPrev').style.display = currentIndex === 0 ? 'none' : 'inline-block';

  if (currentIndex === 14) {
    document.getElementById('btnNext').textContent = '完成';
  } else {
    document.getElementById('btnNext').textContent = '下一题';
  }
}

function toggleAnswer() {
  answerVisible = !answerVisible;
  document.getElementById('answerText').style.display = answerVisible ? 'block' : 'none';
  document.getElementById('btnShowAnswer').textContent = answerVisible ? '隐藏参考答案' : '显示参考答案';
}

function nextQuestion() {
  if (currentIndex >= 14) {
    document.getElementById('gamePage').style.display = 'none';
    document.getElementById('endPage').style.display = 'block';
    return;
  }
  currentIndex++;
  renderQuestion();
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
}

function resetGame() {
  document.getElementById('startPage').style.display = 'block';
  document.getElementById('gamePage').style.display = 'none';
  document.getElementById('endPage').style.display = 'none';
}

  const custom5 = document.getElementById('custom5').value.trim();
  const custom10 = document.getElementById('custom10').value.trim();
  const custom15 = document.getElementById('custom15').value.trim();

  const customSlots = [custom5, custom10, custom15].filter(Boolean).length;
  const needRandom = 15 - customSlots;
  const randomQuestions = shuffle(questionBank).slice(0, needRandom);

  questions = [];
  let randomIdx = 0;
  for (let i = 1; i <= 15; i++) {
    if (i === 5 && custom5) {
      questions.push({ q: custom5, a: "—" });
    } else if (i === 10 && custom10) {
      questions.push({ q: custom10, a: "—" });
    } else if (i === 15 && custom15) {
      questions.push({ q: custom15, a: "—" });
    } else {
      questions.push(randomQuestions[randomIdx++]);
    }
  }

  currentIndex = 0;
  answerVisible = false;
  renderQuestion();
}
</script>
